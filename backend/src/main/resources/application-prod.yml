spring:
  config:
    activate:
      on-profile: prod
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 10000

lite-alert:
  data-dir: /data

logging:
  level:
    root: INFO
    io.litealert: INFO

spring:
  application:
    name: lite-alert
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: false
      write-dates-as-timestamps: false
  datasource:
    url: ${LITE_ALERT_DATASOURCE_URL:jdbc:h2:file:${LITE_ALERT_DATA_DIR:./data}/lite-alert;MODE=MySQL;AUTO_SERVER=TRUE}
    username: ${LITE_ALERT_DATASOURCE_USERNAME:sa}
    password: ${LITE_ALERT_DATASOURCE_PASSWORD:}
    driver-class-name: ${LITE_ALERT_DATASOURCE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${LITE_ALERT_H2_CONSOLE:false}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration/${LITE_ALERT_DATABASE_TYPE:h2}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ---- lite-alert app config ----
lite-alert:
  data-dir: ${LITE_ALERT_DATA_DIR:./data}
  database:
    type: ${LITE_ALERT_DATABASE_TYPE:h2}
  jwt:
    # secret must be supplied via env in non-dev profiles; dev uses a stable fallback
    secret: ${LITE_ALERT_JWT_SECRET:dev-only-secret-change-in-prod-please-32+chars}
    ttl-seconds: 28800
  apikey:
    pepper: ${LITE_ALERT_APIKEY_PEPPER:dev-only-pepper-change-in-prod-please-32}
  webhook:
    max-body-size: 65536
    public-max-body-size: 32768
    allow-user-public-topic: false
    rate-limit:
      per-topic-per-minute: 60
      per-contact-per-hour: 30
      public-per-minute: 30
      public-per-ip-per-minute: 10

jasypt:
  encryptor:
    # main encryptor password is provided via env var in prod; dev uses a default
    password: ${JASYPT_ENCRYPTOR_PASSWORD:dev-only-jasypt-password-change-me}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    salt-generator-classname: org.jasypt.salt.RandomSaltGenerator
    pool-size: 1
    string-output-type: base64

logging:
  level:
    root: INFO
    io.litealert: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
